components:
  schemas:
    DimConvenio:
      type: object
      properties:
        id_convenio:
          type: integer
          readOnly: true
        nome_operadora:
          type: string
          maxLength: 255
        tipo_contrato:
          type: string
          maxLength: 100
        prazo_contratual_pagamento:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
      required:
      - id_convenio
      - nome_operadora
      - prazo_contratual_pagamento
      - tipo_contrato
    DimEquipamento:
      type: object
      properties:
        id_equipamento:
          type: integer
          readOnly: true
        nome_maquina:
          type: string
          maxLength: 255
        modelo:
          type: string
          maxLength: 100
        ultima_manutencao:
          type: string
          format: date-time
      required:
      - id_equipamento
      - modelo
      - nome_maquina
      - ultima_manutencao
    DimMedicamento:
      type: object
      properties:
        id_medicamento:
          type: integer
          readOnly: true
        nome_farmaco:
          type: string
          maxLength: 255
        classe_terapeutica:
          type: string
          maxLength: 100
        custo_unitario:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        item_essencial:
          type: boolean
      required:
      - classe_terapeutica
      - custo_unitario
      - id_medicamento
      - nome_farmaco
    DimMedico:
      type: object
      properties:
        id_medico:
          type: integer
          readOnly: true
        nome_medico:
          type: string
          maxLength: 255
        especialidade:
          type: string
          maxLength: 100
        crm:
          type: string
          maxLength: 20
      required:
      - crm
      - especialidade
      - id_medico
      - nome_medico
    DimPaciente:
      type: object
      properties:
        id_paciente:
          type: integer
          readOnly: true
        pontuacao_nps:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        faixa_etaria:
          type: string
          maxLength: 50
      required:
      - faixa_etaria
      - id_paciente
      - pontuacao_nps
    DimProtocolo:
      type: object
      properties:
        id_protocolo:
          type: integer
          readOnly: true
        nome_protocolo:
          type: string
          maxLength: 255
        area_medica:
          type: string
          maxLength: 100
      required:
      - area_medica
      - id_protocolo
      - nome_protocolo
    DimTempo:
      type: object
      properties:
        id_tempo:
          type: integer
          readOnly: true
        data_registro:
          type: string
          format: date
        mes:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        ano:
